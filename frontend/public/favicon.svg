<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Leaf/brain motif -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- Heart shape representing care -->
    <path d="M0 50 C0 50 -90-20 -90-80 C-90-130 -45-145 0-100 C45-145 90-130 90-80 C90-20 0 50 0 50Z" fill="white" fill-opacity="0.95" stroke="none"/>
    <!-- Plus sign inside heart for health -->
    <line x1="0" y1="-30" x2="0" y2="-80" stroke="#059669" stroke-width="20"/>
    <line x1="-25" y1="-55" x2="25" y2="-55" stroke="#059669" stroke-width="20"/>
  </g>
  <!-- MC text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="88" fill="white" letter-spacing="-2">MC</text>
</svg>
